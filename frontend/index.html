<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente RAG Local</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        #chat { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 20px; }
        .user { background: #007bff; color: white; padding: 10px; margin: 5px; border-radius: 10px; text-align: right; }
        .assistant { background: #28a745; color: white; padding: 10px; margin: 5px; border-radius: 10px; }
        input { width: 80%; padding: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>
    <h1>🤖 Assistente com Ollama + RAG</h1>
    <div id="chat"></div>
    <input type="text" id="question" placeholder="Faça sua pergunta...">
    <button onclick="ask()">Enviar</button>

    <script>
        const API_URL = 'http://localhost:3000';
        
        async function ask() {
            const question = document.getElementById('question').value;
            if (!question) return;
            
            // Mostra pergunta do usuário
            const chatDiv = document.getElementById('chat');
            chatDiv.innerHTML += `<div class="user">👤 ${question}</div>`;
            chatDiv.innerHTML += `<div class="loading">🤔 Pensando...</div>`;
            document.getElementById('question').value = '';
            chatDiv.scrollTop = chatDiv.scrollHeight;
            
            try {
                const response = await fetch(`${API_URL}/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });
                
                const data = await response.json();
                
                // Remove loading e mostra resposta
                const loading = document.querySelector('.loading:last-child');
                if (loading) loading.remove();
                
                chatDiv.innerHTML += `<div class="assistant">🤖 ${data.answer}</div>`;
            } catch (error) {
                const loading = document.querySelector('.loading:last-child');
                if (loading) loading.remove();
                chatDiv.innerHTML += `<div class="assistant" style="background:#dc3545">❌ Erro: ${error.message}</div>`;
            }
            
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
        
        // Enter key
        document.getElementById('question').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') ask();
        });
    </script>
</body>
</html>
