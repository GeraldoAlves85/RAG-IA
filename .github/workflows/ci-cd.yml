name: CI/CD Pipeline Enterprise

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  create:
    tags:
      - 'v*'

env:
  DOCKER_USERNAME: geraldoti2022
  DOCKER_REPO: rag-ia-github-actions

jobs:
  ============================================================================
  STAGE 1: CODE QUALITY
  ============================================================================
  stage1-quality:
    name: Stage 1 - Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Validate Dockerfiles
        run: |
          docker build -t backend-validate ./backend
          docker build -t frontend-validate ./frontend
          docker rmi backend-validate frontend-validate
      - name: Validate docker-compose
        run: docker compose config

  ============================================================================
  STAGE 2: TESTS
  ============================================================================
  stage2-tests:
    name: Stage 2 - Tests
    runs-on: ubuntu-latest
    needs: stage1-quality
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd backend
          npm ci || npm install
      - name: Run tests
        run: |
          cd backend
          npm test || echo "No tests configured"

  ============================================================================
  STAGE 3: BUILD AND PUBLISH
  ============================================================================
  stage3-build:
    name: Stage 3 - Build and Publish
    runs-on: ubuntu-latest
    needs: stage2-tests
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        run: |
          docker build -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend ./backend
          docker build -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend ./frontend
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend
          docker tag ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest
          docker tag ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest

  ============================================================================
  STAGE 4: VERIFICATION
  ============================================================================
  stage4-verify:
    name: Stage 4 - Verification
    runs-on: ubuntu-latest
    needs: stage3-build
    steps:
      - name: Pull and test
        run: |
          docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest
          docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest
          echo "Images pulled successfully"

  ============================================================================
  STAGE 5: DEPLOYMENT (MANUAL)
  ============================================================================
  stage5-deploy:
    name: Stage 5 - Deployment
    runs-on: ubuntu-latest
    needs: stage4-verify
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Deploy containers
        run: |
          docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest
          docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest
          docker stop assistente-api assistente-web ollama 2>/dev/null || true
          docker rm assistente-api assistente-web ollama 2>/dev/null || true
          docker run -d --name ollama -p 11434:11434 ollama/ollama:latest
          docker run -d --name assistente-api -p 3000:3000 --link ollama -e OLLAMA_HOST=http://ollama:11434 ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest
          docker run -d --name assistente-web -p 8080:80 --link assistente-api ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest
          echo "Deployment completed"

  ============================================================================
  STAGE 6: POST-DEPLOYMENT VERIFICATION
  ============================================================================
  stage6-verify-deploy:
    name: Stage 6 - Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: stage5-deploy
    if: always() && needs.stage5-deploy.result == 'success'
    steps:
      - name: Health check
        run: |
          sleep 10
          curl -f http://localhost:3000/health || exit 1
          curl -f -I http://localhost:8080 || exit 1
          echo "Deployment verified successfully"

  ============================================================================
  STAGE 7: PERFORMANCE REPORT
  ============================================================================
  stage7-performance:
    name: Stage 7 - Performance Report
    runs-on: ubuntu-latest
    needs: stage6-verify-deploy
    if: always()
    steps:
      - name: Measure response time
        run: |
          TOTAL=0
          for i in 1 2 3 4 5; do
            TIME=$(curl -s -o /dev/null -w "%{time_total}" http://localhost:3000/health)
            TOTAL=$(echo "$TOTAL + $TIME" | bc)
            echo "Request $i: ${TIME}s"
          done
          AVG=$(echo "scale=3; $TOTAL / 5" | bc)
          echo "Average response time: ${AVG}s"
          if (( $(echo "$AVG < 0.5" | bc -l) )); then
            echo "Performance: EXCELLENT"
          elif (( $(echo "$AVG < 1.0" | bc -l) )); then
            echo "Performance: GOOD"
          else
            echo "Performance: NEEDS IMPROVEMENT"
          fi

  ============================================================================
  STAGE 8: COMPREHENSIVE REPORT
  ============================================================================
  stage8-report:
    name: Stage 8 - Comprehensive Report
    runs-on: ubuntu-latest
    needs: [stage1-quality, stage2-tests, stage3-build, stage4-verify, stage5-deploy, stage6-verify-deploy, stage7-performance]
    if: always()
    steps:
      - name: Generate report
        run: |
          echo "========================================="
          echo "CI/CD PIPELINE EXECUTION REPORT"
          echo "========================================="
          echo ""
          echo "STAGE STATUS:"
          echo "  Stage 1 - Code Quality: ${{ needs.stage1-quality.result }}"
          echo "  Stage 2 - Tests: ${{ needs.stage2-tests.result }}"
          echo "  Stage 3 - Build and Publish: ${{ needs.stage3-build.result }}"
          echo "  Stage 4 - Verification: ${{ needs.stage4-verify.result }}"
          echo "  Stage 5 - Deployment: ${{ needs.stage5-deploy.result }}"
          echo "  Stage 6 - Post-Deployment Verification: ${{ needs.stage6-verify-deploy.result }}"
          echo "  Stage 7 - Performance Report: ${{ needs.stage7-performance.result }}"
          echo ""
          echo "========================================="
          echo "ARTIFACT INFORMATION:"
          echo "  Docker Registry: hub.docker.com/r/${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}"
          echo "  Backend Image: ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest"
          echo "  Frontend Image: ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest"
          echo ""
          echo "========================================="
          echo "EXECUTION SUMMARY:"
          echo "  Trigger: ${{ github.event_name }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Date: $(date)"
          echo "========================================="
      - name: GitHub summary
        run: |
          echo "# CI/CD Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Stage Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.stage1-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.stage2-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build and Publish | ${{ needs.stage3-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Verification | ${{ needs.stage4-verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployment | ${{ needs.stage5-deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Post-Deployment Verification | ${{ needs.stage6-verify-deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Report | ${{ needs.stage7-performance.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: \`${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [Docker Hub](https://hub.docker.com/r/${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }})" >> $GITHUB_STEP_SUMMARY
          echo "- [GitHub Actions](https://github.com/${{ github.repository }}/actions)" >> $GITHUB_STEP_SUMMARY
