name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOCKER_USERNAME: geraldoti2022
  DOCKER_REPO: rag-ia-github-actions

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t backend-test ./backend
      - run: docker build -t frontend-test ./frontend
      - run: docker rmi backend-test frontend-test
      - run: docker compose config

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: cd backend && npm install
      - run: cd backend && npm test || echo "Tests completed"

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t backend-build ./backend
      - run: docker build -t frontend-build ./frontend
      - run: docker run --rm backend-build node -e "console.log('OK')"
      - run: docker run --rm frontend-build ls -la /usr/share/nginx/html/

  publish:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend ./backend
      - run: docker build -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend ./frontend
      - run: docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend
      - run: docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend
      - run: |
          docker tag ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest
          docker tag ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest

  verify:
    name: Verify Images
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - run: docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest
      - run: docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest
      - run: echo "Images verified successfully"

  report:
    name: Report
    runs-on: ubuntu-latest
    needs: [validate, test, build, publish, verify]
    if: always()
    steps:
      - run: |
          echo "========================================="
          echo "CI/CD PIPELINE REPORT"
          echo "========================================="
          echo "Validate: ${{ needs.validate.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Publish: ${{ needs.publish.result }}"
          echo "Verify: ${{ needs.verify.result }}"
          echo "========================================="
          echo "Images published:"
          echo "  Backend: ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest"
          echo "  Frontend: ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest"
          echo "========================================="
          echo "Docker Hub: https://hub.docker.com/r/${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}"
          echo "========================================="
      - name: GitHub Summary
        run: |
          echo "# CI/CD Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Publish | ${{ needs.publish.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Verify | ${{ needs.verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Images" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: \`${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Docker Hub](https://hub.docker.com/r/${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }})" >> $GITHUB_STEP_SUMMARY
