name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to Docker Hub'
        required: false
        default: 'false'
        type: boolean

env:
  DOCKER_USERNAME: geraldoti2022
  DOCKER_REPOSITORY: rag-ia-github-actions

jobs:
  ============================================================================
  STAGE 1: VALIDATION
  ============================================================================
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check files
        run: |
          [ -f backend/server.js ] && echo "✓ backend/server.js"
          [ -f backend/package.json ] && echo "✓ backend/package.json"
          [ -f frontend/index.html ] && echo "✓ frontend/index.html"
          [ -f frontend/Dockerfile ] && echo "✓ frontend/Dockerfile"
          [ -f docker-compose.yml ] && echo "✓ docker-compose.yml"
      - name: Validate Dockerfiles
        run: |
          docker build -t test-backend ./backend
          docker build -t test-frontend ./frontend
          docker rmi test-backend test-frontend

  ============================================================================
  STAGE 2: DEPENDENCIES
  ============================================================================
  dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install and audit
        run: |
          cd backend
          npm ci || npm install
          npm audit --json || true

  ============================================================================
  STAGE 3: TESTS
  ============================================================================
  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: dependencies
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Execute tests
        run: |
          cd backend
          npm install
          npm test || echo "No tests configured"

  ============================================================================
  STAGE 4: BUILD CONTAINERS
  ============================================================================
  build:
    name: Build Containers
    runs-on: ubuntu-latest
    needs: tests
    outputs:
      timestamp: ${{ steps.version.outputs.timestamp }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: echo "timestamp=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
      - name: Build backend
        run: docker build -t backend:${{ steps.version.outputs.timestamp }} ./backend
      - name: Build frontend
        run: docker build -t frontend:${{ steps.version.outputs.timestamp }} ./frontend
      - name: Test containers
        run: |
          docker run --rm backend:${{ steps.version.outputs.timestamp }} node -e "console.log('OK')"
          docker run --rm frontend:${{ steps.version.outputs.timestamp }} ls -la /usr/share/nginx/html/

  ============================================================================
  STAGE 5: PUBLISH TO DOCKER HUB
  ============================================================================
  publish:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push backend
        run: |
          docker build -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:backend ./backend
          docker build -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:backend-${{ needs.build.outputs.timestamp }} ./backend
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:backend
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:backend-latest
      - name: Build and push frontend
        run: |
          docker build -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend ./frontend
          docker build -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend-${{ needs.build.outputs.timestamp }} ./frontend
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend-latest

  ============================================================================
  STAGE 6: DEPLOY (MANUAL)
  ============================================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Pull images
        run: |
          docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:backend-latest
          docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend-latest
      - name: Start containers
        run: |
          docker stop assistente-api assistente-web ollama 2>/dev/null || true
          docker rm assistente-api assistente-web ollama 2>/dev/null || true
          docker run -d --name ollama -p 11434:11434 ollama/ollama:latest
          docker run -d --name assistente-api -p 3000:3000 --link ollama -e OLLAMA_HOST=http://ollama:11434 ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:backend-latest
          docker run -d --name assistente-web -p 8080:80 --link assistente-api ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend-latest

  ============================================================================
  STAGE 7: VERIFY
  ============================================================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    steps:
      - name: Health check
        run: |
          sleep 10
          curl -f http://localhost:3000/health || exit 1
          curl -f -I http://localhost:8080 || exit 1
          echo "Deployment verified successfully"

  ============================================================================
  STAGE 8: REPORT
  ============================================================================
  report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: [validate, dependencies, tests, build, publish, deploy, verify]
    if: always()
    steps:
      - name: Create summary
        run: |
          echo "# CI/CD Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependencies | ${{ needs.dependencies.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Publish | ${{ needs.publish.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Verify | ${{ needs.verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Images" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:backend-latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: \`${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend-latest\`" >> $GITHUB_STEP_SUMMARY
