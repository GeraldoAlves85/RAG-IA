name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Adicionar trigger manual para deploy
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Fazer deploy para produção?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  # ============================================
  # JOB 1: BUILD E TEST (Sempre executa)
  # ============================================
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: 📦 Instalar dependências
        run: |
          cd backend
          npm ci
      
      - name: ✅ Rodar testes
        run: |
          cd backend
          npm test
      
      - name: 🐳 Build imagem Backend
        run: |
          docker build -t assistente-backend:test ./backend
          docker images | grep assistente-backend
      
      - name: 🐳 Build imagem Frontend
        run: |
          docker build -t assistente-frontend:test ./frontend
          docker images | grep assistente-frontend
      
      - name: 📝 Validar Docker Compose
        run: |
          docker compose config
      
      - name: 🔍 Verificar arquivos essenciais
        run: |
          test -f backend/server.js && echo "✅ Backend OK"
          test -f frontend/index.html && echo "✅ Frontend OK"
          test -f docker-compose.yml && echo "✅ Docker Compose OK"
      
      - name: 📊 Gerar relatório
        run: |
          echo "## 📊 Relatório de Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Backend:** Build concluído" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Frontend:** Build concluído" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Testes:** Passaram" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Docker:** Válido" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔑 **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "📅 **Data:** $(date)" >> $GITHUB_STEP_SUMMARY
      
      - name: 💾 Salvar artefatos (opcional)
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            backend/
            frontend/
            docker-compose.yml
          retention-days: 7

  # ============================================
  # JOB 2: DEPLOY (Executa apenas manualmente ou em condições específicas)
  # ============================================
  deploy:
    name: 🚀 Deploy para Produção
    runs-on: ubuntu-latest
    needs: build-and-test
    # Só executa se:
    # 1. For um push na main E tiver uma tag específica
    # 2. OU for disparado manualmente com a opção deploy=true
    # 3. OU for um push para branch de release
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true' ||
      github.ref_type == 'tag' && startsWith(github.ref_name, 'v') ||
      github.ref == 'refs/heads/release'
    
    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4
      
      - name: 🔑 Login no Docker Hub
        if: secrets.DOCKER_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: 🏷️ Gerar tags
        id: tags
        run: |
          # Gerar tags baseadas no commit/tag
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "tags=${{ secrets.DOCKER_USERNAME }}/rag-assistente:${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/rag-assistente:${VERSION},${{ secrets.DOCKER_USERNAME }}/rag-assistente:latest" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
            echo "tags=${{ secrets.DOCKER_USERNAME }}/rag-assistente:${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/rag-assistente:dev" >> $GITHUB_OUTPUT
          fi
      
      - name: 🐳 Build e push Backend
        run: |
          docker build -t backend-prod ./backend
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
            docker tag backend-prod ${{ secrets.DOCKER_USERNAME }}/rag-assistente-backend:${{ steps.tags.outputs.version }}
            docker push ${{ secrets.DOCKER_USERNAME }}/rag-assistente-backend:${{ steps.tags.outputs.version }}
          fi
      
      - name: 🐳 Build e push Frontend
        run: |
          docker build -t frontend-prod ./frontend
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
            docker tag frontend-prod ${{ secrets.DOCKER_USERNAME }}/rag-assistente-frontend:${{ steps.tags.outputs.version }}
            docker push ${{ secrets.DOCKER_USERNAME }}/rag-assistente-frontend:${{ steps.tags.outputs.version }}
          fi
      
      - name: 📢 Notificar deploy
        run: |
          echo "## 🚀 Deploy realizado!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Versão:** ${{ steps.tags.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Data:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Imagens publicadas:**" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`${{ secrets.DOCKER_USERNAME }}/rag-assistente-backend:${{ steps.tags.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: \`${{ secrets.DOCKER_USERNAME }}/rag-assistente-frontend:${{ steps.tags.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # JOB 3: Notificação (opcional)
  # ============================================
  notify:
    name: 📢 Notificação Final
    runs-on: ubuntu-latest
    needs: [build-and-test, deploy]
    if: always()
    
    steps:
      - name: ✅ Status Final
        run: |
          echo "========================================="
          echo "📊 STATUS DO PIPELINE"
          echo "========================================="
          echo "🔨 Build & Test: ${{ needs.build-and-test.result }}"
          echo "🚀 Deploy: ${{ needs.deploy.result }}"
          echo "========================================="
          
          if [ "${{ needs.build-and-test.result }}" == "success" ]; then
            echo "🎉 Build e testes passaram com sucesso!"
          else
            echo "❌ Build ou testes falharam!"
            exit 1
          fi
