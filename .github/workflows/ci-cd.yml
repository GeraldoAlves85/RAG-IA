name: CI/CD Pipeline Enterprise

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  DOCKER_USERNAME: geraldoti2022
  DOCKER_REPOSITORY: rag-ia-github-actions
  NODE_VERSION: 18

jobs:
  ============================================================================
  STAGE 1: CODE VALIDATION
  ============================================================================
  stage1-validation:
    name: Stage 1 - Code Validation
    runs-on: ubuntu-latest
    continue-on-error: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate repository structure
        run: |
          echo "Validating repository structure"
          [ -f "backend/server.js" ] && echo "OK: backend/server.js exists" || exit 1
          [ -f "backend/package.json" ] && echo "OK: backend/package.json exists" || exit 1
          [ -f "frontend/index.html" ] && echo "OK: frontend/index.html exists" || exit 1
          [ -f "frontend/Dockerfile" ] && echo "OK: frontend/Dockerfile exists" || exit 1
          [ -f "docker-compose.yml" ] && echo "OK: docker-compose.yml exists" || exit 1
      
      - name: Validate Dockerfiles syntax
        run: |
          echo "Validating Dockerfile syntax"
          docker build -t validate-backend ./backend --no-cache
          docker build -t validate-frontend ./frontend --no-cache
          docker rmi validate-backend validate-frontend
          echo "Dockerfiles are valid"
      
      - name: Validate docker-compose
        run: |
          docker compose config
          echo "docker-compose.yml is valid"
      
      - name: Check for sensitive data
        run: |
          if grep -r "password\|secret\|token\|key" --include="*.js" --include="*.json" . 2>/dev/null | grep -v "node_modules" | grep -v ".github" | grep -v "package-lock"; then
            echo "WARNING: Potential sensitive data found"
          else
            echo "No sensitive patterns detected"
          fi

  ============================================================================
  STAGE 2: DEPENDENCY ANALYSIS
  ============================================================================
  stage2-dependencies:
    name: Stage 2 - Dependency Analysis
    runs-on: ubuntu-latest
    needs: stage1-validation
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: |
          cd backend
          npm ci || npm install
          echo "Dependencies installed: $(npm list --depth=0 | wc -l) packages"
      
      - name: Audit vulnerabilities
        run: |
          cd backend
          npm audit --json > audit-report.json || true
          HIGH=$(grep -o '"severity":"high"' audit-report.json | wc -l)
          CRITICAL=$(grep -o '"severity":"critical"' audit-report.json | wc -l)
          echo "High vulnerabilities: $HIGH"
          echo "Critical vulnerabilities: $CRITICAL"
          if [ $CRITICAL -gt 0 ]; then
            echo "WARNING: Critical vulnerabilities found"
          fi
      
      - name: Check outdated packages
        run: |
          cd backend
          npm outdated --json || echo "All packages up to date"

  ============================================================================
  STAGE 3: CODE QUALITY
  ============================================================================
  stage3-quality:
    name: Stage 3 - Code Quality
    runs-on: ubuntu-latest
    needs: stage2-dependencies
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check code formatting
        run: |
          echo "Checking code formatting"
          cd backend
          if [ -f "server.js" ]; then
            wc -l server.js
            echo "Code formatting check completed"
          fi
      
      - name: Analyze code complexity
        run: |
          echo "Code complexity analysis"
          cd backend
          FUNCTIONS=$(grep -c "function\|=>" server.js || echo "0")
          echo "Functions detected: $FUNCTIONS"
          LINES=$(wc -l < server.js)
          echo "Total lines: $LINES"
          echo "Complexity score: $(($LINES / 100))"
      
      - name: Validate error handling
        run: |
          echo "Validating error handling"
          if grep -q "try.*catch" backend/server.js; then
            echo "OK: Error handling detected"
          else
            echo "WARNING: Limited error handling"
          fi

  ============================================================================
  STAGE 4: UNIT TESTS
  ============================================================================
  stage4-tests:
    name: Stage 4 - Unit Tests
    runs-on: ubuntu-latest
    needs: stage3-quality
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install test dependencies
        run: |
          cd backend
          npm ci || npm install
      
      - name: Run unit tests
        id: tests
        run: |
          cd backend
          if npm test 2>&1; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "All tests passed"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "Tests failed"
            exit 0
          fi
      
      - name: Test summary
        run: |
          echo "Test execution completed"
          echo "Status: ${{ steps.tests.outputs.status }}"

  ============================================================================
  STAGE 5: CONTAINER BUILD
  ============================================================================
  stage5-build:
    name: Stage 5 - Container Build
    runs-on: ubuntu-latest
    needs: stage4-tests
    
    outputs:
      timestamp: ${{ steps.version.outputs.timestamp }}
      sha: ${{ steps.version.outputs.sha }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate version metadata
        id: version
        run: |
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          SHORT_SHA=${GITHUB_SHA::7}
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Version: ${TIMESTAMP}"
      
      - name: Build backend container
        run: |
          docker build -t backend:${{ steps.version.outputs.timestamp }} ./backend
          docker images backend:${{ steps.version.outputs.timestamp }}
          echo "Backend container built"
      
      - name: Build frontend container
        run: |
          docker build -t frontend:${{ steps.version.outputs.timestamp }} ./frontend
          docker images frontend:${{ steps.version.outputs.timestamp }}
          echo "Frontend container built"
      
      - name: Test containers locally
        run: |
          echo "Testing backend container"
          docker run --rm backend:${{ steps.version.outputs.timestamp }} node -e "console.log('OK')"
          
          echo "Testing frontend container"
          docker run --rm frontend:${{ steps.version.outputs.timestamp }} ls -la /usr/share/nginx/html/
          
          echo "Both containers are functional"
      
      - name: Measure container size
        run: |
          BACKEND_SIZE=$(docker images backend:${{ steps.version.outputs.timestamp }} --format "{{.Size}}")
          FRONTEND_SIZE=$(docker images frontend:${{ steps.version.outputs.timestamp }} --format "{{.Size}}")
          echo "Backend size: $BACKEND_SIZE"
          echo "Frontend size: $FRONTEND_SIZE"

  ============================================================================
  STAGE 6: DOCKER HUB PUBLISH
  ============================================================================
  stage6-publish:
    name: Stage 6 - Docker Hub Publish
    runs-on: ubuntu-latest
    needs: stage5-build
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and tag backend
        run: |
          docker build -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:backend ./backend
          docker tag ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:backend ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:backend-latest
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:backend
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:backend-latest
          echo "Backend image published"
      
      - name: Build and tag frontend
        run: |
          docker build -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend ./frontend
          docker tag ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend-latest
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend-latest
          echo "Frontend image published"
      
      - name: Verify images on Docker Hub
        run: |
          echo "Verifying images on Docker Hub"
          curl -s "https://hub.docker.com/v2/repositories/${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}/tags/" | grep -o '"name":"[^"]*"' | head -5

  ============================================================================
  STAGE 7: DEPLOYMENT
  ============================================================================
  stage7-deploy:
    name: Stage 7 - Deployment
    runs-on: ubuntu-latest
    needs: stage6-publish
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Pull latest images
        run: |
          docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:backend-latest
          docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend-latest
          echo "Images pulled successfully"
      
      - name: Stop existing containers
        run: |
          docker stop assistente-api assistente-web ollama 2>/dev/null || true
          docker rm assistente-api assistente-web ollama 2>/dev/null || true
          echo "Existing containers removed"
      
      - name: Start new containers
        run: |
          docker run -d --name ollama -p 11434:11434 ollama/ollama:latest
          docker run -d --name assistente-api -p 3000:3000 --link ollama:ollama -e OLLAMA_HOST=http://ollama:11434 ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:backend-latest
          docker run -d --name assistente-web -p 8080:80 --link assistente-api:assistente-api ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend-latest
          echo "All containers started"
      
      - name: Deployment summary
        run: |
          echo "Deployment completed"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Timestamp: $(date)"

  ============================================================================
  STAGE 8: POST-DEPLOYMENT VERIFICATION
  ============================================================================
  stage8-verify:
    name: Stage 8 - Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: stage7-deploy
    if: always() && needs.stage7-deploy.result == 'success'
    
    steps:
      - name: Wait for services to start
        run: sleep 10
      
      - name: Verify backend health
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend health check: PASSED"
              exit 0
            fi
            echo "Attempt $i/30 - Waiting for backend..."
            sleep 2
          done
          echo "Backend health check: FAILED"
          exit 1
      
      - name: Verify frontend
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "304" ]; then
              echo "Frontend verification: PASSED"
              exit 0
            fi
            echo "Attempt $i/20 - Waiting for frontend..."
            sleep 2
          done
          echo "Frontend verification: FAILED"
          exit 1
      
      - name: Test API endpoint
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:3000/ask -H "Content-Type: application/json" -d '{"question":"test"}' || echo "{}")
          if echo "$RESPONSE" | grep -q "answer\|error"; then
            echo "API endpoint test: PASSED"
          else
            echo "API endpoint test: FAILED"
          fi

  ============================================================================
  STAGE 9: PERFORMANCE REPORT
  ============================================================================
  stage9-performance:
    name: Stage 9 - Performance Report
    runs-on: ubuntu-latest
    needs: stage8-verify
    if: always()
    
    steps:
      - name: Measure response time
        run: |
          echo "Measuring API response time"
          TOTAL=0
          for i in {1..10}; do
            TIME=$(curl -s -o /dev/null -w "%{time_total}" http://localhost:3000/health)
            TOTAL=$(echo "$TOTAL + $TIME" | bc)
            echo "Request $i: ${TIME}s"
          done
          AVG=$(echo "scale=3; $TOTAL / 10" | bc)
          echo "Average response time: ${AVG}s"
          
          if (( $(echo "$AVG < 0.5" | bc -l) )); then
            echo "Performance: EXCELLENT"
          elif (( $(echo "$AVG < 1.0" | bc -l) )); then
            echo "Performance: GOOD"
          else
            echo "Performance: NEEDS IMPROVEMENT"
          fi
      
      - name: Container resource usage
        run: |
          echo "Container resource usage"
          docker stats --no-stream ollama assistente-api assistente-web 2>/dev/null || echo "Containers not running"

  ============================================================================
  STAGE 10: COMPREHENSIVE REPORT
  ============================================================================
  stage10-report:
    name: Stage 10 - Comprehensive Report
    runs-on: ubuntu-latest
    needs: [stage1-validation, stage2-dependencies, stage3-quality, stage4-tests, stage5-build, stage6-publish, stage7-deploy, stage8-verify, stage9-performance]
    if: always()
    
    steps:
      - name: Generate execution report
        run: |
          echo "========================================="
          echo "CI/CD PIPELINE EXECUTION REPORT"
          echo "========================================="
          echo ""
          echo "STAGE STATUS:"
          echo "  Stage 1 - Code Validation: ${{ needs.stage1-validation.result }}"
          echo "  Stage 2 - Dependency Analysis: ${{ needs.stage2-dependencies.result }}"
          echo "  Stage 3 - Code Quality: ${{ needs.stage3-quality.result }}"
          echo "  Stage 4 - Unit Tests: ${{ needs.stage4-tests.result }}"
          echo "  Stage 5 - Container Build: ${{ needs.stage5-build.result }}"
          echo "  Stage 6 - Docker Hub Publish: ${{ needs.stage6-publish.result }}"
          echo "  Stage 7 - Deployment: ${{ needs.stage7-deploy.result }}"
          echo "  Stage 8 - Post-Deployment Verification: ${{ needs.stage8-verify.result }}"
          echo "  Stage 9 - Performance Report: ${{ needs.stage9-performance.result }}"
          echo ""
          echo "========================================="
          echo "ARTIFACT INFORMATION:"
          echo "  Docker Registry: hub.docker.com/r/geraldoti2022/rag-ia-github-actions"
          echo "  Backend Image: geraldoti2022/rag-ia-github-actions:backend-latest"
          echo "  Frontend Image: geraldoti2022/rag-ia-github-actions:frontend-latest"
          echo ""
          echo "========================================="
          echo "EXECUTION SUMMARY:"
          echo "  Trigger: ${{ github.event_name }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Date: $(date)"
          echo "========================================="
      
      - name: GitHub summary report
        run: |
          echo "# CI/CD Pipeline Execution Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Stage Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Validation | ${{ needs.stage1-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Analysis | ${{ needs.stage2-dependencies.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.stage3-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.stage4-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Build | ${{ needs.stage5-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Hub Publish | ${{ needs.stage6-publish.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployment | ${{ needs.stage7-deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Post-Deployment Verification | ${{ needs.stage8-verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Report | ${{ needs.stage9-performance.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`geraldoti2022/rag-ia-github-actions:backend-latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: \`geraldoti2022/rag-ia-github-actions:frontend-latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [Docker Hub](https://hub.docker.com/r/geraldoti2022/rag-ia-github-actions)" >> $GITHUB_STEP_SUMMARY
          echo "- [GitHub Actions](https://github.com/${{ github.repository }}/actions)" >> $GITHUB_STEP_SUMMARY
