name: CI/CD Pipeline - Automatizado

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Deploy automático via tag
  create:
    tags:
      - 'v*'

env:
  DOCKER_USERNAME: geraldoti2022
  DOCKER_REPO: rag-ia-github-actions

jobs:
  # ============================================
  # JOB 1: BUILD E TESTE (SEMPRE RODA)
  # ============================================
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: 📦 Instalar dependências
        run: |
          cd backend
          npm ci || npm install
      
      - name: ✅ Rodar testes
        run: |
          cd backend
          npm test
      
      - name: 🐳 Build Backend
        run: docker build -t backend-test ./backend
      
      - name: 🐳 Build Frontend
        run: docker build -t frontend-test ./frontend
      
      - name: 📝 Validar Docker Compose
        run: docker compose config
      
      - name: 🧪 Testar containers
        run: |
          docker run --rm backend-test node -e "console.log('Backend OK')"
          docker run --rm frontend-test ls -la /usr/share/nginx/html/
      
      - name: 📊 Relatório Build
        run: |
          echo "## ✅ Build & Test Passaram!" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Data: $(date)" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # JOB 2: DEPLOY AUTOMÁTICO (APENAS NA MAIN)
  # ============================================
  deploy-automatico:
    name: 🚀 Deploy Automático
    runs-on: ubuntu-latest
    needs: build-and-test
    # Roda automaticamente em:
    # 1. Push na main
    # 2. Criação de tags v*
    # 3. Workflow manual (fallback)
    if: |
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🔑 Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: 🏷️ Gerar versões
        id: vars
        run: |
          echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
          
          # Gerar versão a partir da tag
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi
      
      - name: 🐳 Build e tag Backend
        run: |
          docker build -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend \
                       -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-${{ steps.vars.outputs.date }} \
                       -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-${{ steps.vars.outputs.sha_short }} \
                       ./backend
          
          if [ "${{ steps.vars.outputs.is_tag }}" == "true" ]; then
            docker tag ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:${{ steps.vars.outputs.version }}
          fi
      
      - name: 🐳 Build e tag Frontend
        run: |
          docker build -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend \
                       -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-${{ steps.vars.outputs.date }} \
                       -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-${{ steps.vars.outputs.sha_short }} \
                       ./frontend
          
          if [ "${{ steps.vars.outputs.is_tag }}" == "true" ]; then
            docker tag ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:${{ steps.vars.outputs.version }}-frontend
          fi
      
      - name: 📤 Push para Docker Hub
        run: |
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }} --all-tags
          echo "✅ Push concluído!"
      
      - name: 🏷️ Atualizar latest
        run: |
          docker tag ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest
          docker tag ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest
      
      - name: 📢 Notificar deploy
        run: |
          echo "## 🚀 Deploy Automático Realizado!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Informação | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Versão | ${{ steps.vars.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Data | $(date) |" >> $GITHUB_STEP_SUMMARY
          echo "| Imagem Backend | \`${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Imagem Frontend | \`${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Docker Hub:** https://hub.docker.com/r/${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}/tags" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # JOB 3: VERIFICAÇÃO PÓS-DEPLOY
  # ============================================
  verify:
    name: 🔍 Verificar Deploy
    runs-on: ubuntu-latest
    needs: deploy-automatico
    if: always() && needs.deploy-automatico.result == 'success'
    
    steps:
      - name: 🐳 Baixar imagens
        run: |
          docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest
          docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest
      
      - name: 🧪 Testar Backend
        run: |
          docker run --rm -d --name test-bk -p 3000:3000 ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest
          sleep 5
          curl -f http://localhost:3000/health && echo "✅ Backend OK" || echo "❌ Backend falhou"
          docker stop test-bk
      
      - name: 🧪 Testar Frontend
        run: |
          docker run --rm -d --name test-fr -p 8080:80 ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest
          sleep 2
          curl -f -I http://localhost:8080 && echo "✅ Frontend OK" || echo "❌ Frontend falhou"
          docker stop test-fr
      
      - name: ✅ Verificação OK
        run: echo "🎉 Deploy verificado e funcionando!"

  # ============================================
  # JOB 4: RELATÓRIO FINAL
  # ============================================
  report:
    name: 📊 Relatório Final
    runs-on: ubuntu-latest
    needs: [build-and-test, deploy-automatico, verify]
    if: always()
    
    steps:
      - name: 📈 Gerar relatório
        run: |
          echo "# 📊 Pipeline CI/CD - Relatório Final" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Status das Etapas" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Etapa | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Build & Test | ${{ needs.build-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Deploy | ${{ needs.deploy-automatico.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Verificação | ${{ needs.verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.build-and-test.result }}" == "success" ] && [ "${{ needs.deploy-automatico.result }}" == "success" ]; then
            echo "## 🎉 Pipeline concluído com sucesso!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Build e testes passaram" >> $GITHUB_STEP_SUMMARY
            echo "✅ Deploy realizado automaticamente" >> $GITHUB_STEP_SUMMARY
            echo "✅ Imagens verificadas e funcionando" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Pipeline com falhas" >> $GITHUB_STEP_SUMMARY
            echo "Verifique os logs acima para mais detalhes." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Links úteis:**" >> $GITHUB_STEP_SUMMARY
          echo "- [Docker Hub](https://hub.docker.com/r/${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}/tags)" >> $GITHUB_STEP_SUMMARY
          echo "- [GitHub Actions](https://github.com/${{ github.repository }}/actions)" >> $GITHUB_STEP_SUMMARY
