name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Dockerfiles
        run: |
          docker build -t backend-test ./backend
          docker build -t frontend-test ./frontend
          docker rmi backend-test frontend-test
      - name: Validate compose
        run: docker compose config

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd backend
          npm install
      - name: Run tests
        run: |
          cd backend
          npm test

  build:
    name: Build and Publish
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: geraldoti2022
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build backend
        run: |
          docker build -t geraldoti2022/rag-ia-github-actions:backend ./backend
          docker push geraldoti2022/rag-ia-github-actions:backend
      - name: Build frontend
        run: |
          docker build -t geraldoti2022/rag-ia-github-actions:frontend ./frontend
          docker push geraldoti2022/rag-ia-github-actions:frontend
      - name: Tag latest
        run: |
          docker tag geraldoti2022/rag-ia-github-actions:backend geraldoti2022/rag-ia-github-actions:backend-latest
          docker tag geraldoti2022/rag-ia-github-actions:frontend geraldoti2022/rag-ia-github-actions:frontend-latest
          docker push geraldoti2022/rag-ia-github-actions:backend-latest
          docker push geraldoti2022/rag-ia-github-actions:frontend-latest

  verify:
    name: Verification
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Pull images
        run: |
          docker pull geraldoti2022/rag-ia-github-actions:backend-latest
          docker pull geraldoti2022/rag-ia-github-actions:frontend-latest
          echo "Images verified successfully"

  report:
    name: Report
    runs-on: ubuntu-latest
    needs: [code-quality, tests, build, verify]
    if: always()
    steps:
      - name: Generate report
        run: |
          echo "========================================="
          echo "CI/CD PIPELINE REPORT"
          echo "========================================="
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo "Tests: ${{ needs.tests.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Verify: ${{ needs.verify.result }}"
          echo "========================================="
