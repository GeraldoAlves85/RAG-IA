name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Fazer deploy?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  # ============================================
  # JOB 1: BUILD E TEST
  # ============================================
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: 📦 Instalar dependências
        run: |
          cd backend
          npm install
      
      - name: ✅ Rodar testes
        run: |
          cd backend
          npm test
      
      - name: 🐳 Build Backend
        run: docker build -t backend-test ./backend
      
      - name: 🐳 Build Frontend
        run: docker build -t frontend-test ./frontend
      
      - name: 📝 Validar Docker Compose
        run: docker compose config
      
      - name: ✅ Build concluído
        run: echo "✅ Build e testes passaram!"

  # ============================================
  # JOB 2: DEPLOY PARA DOCKER HUB
  # ============================================
  deploy:
    name: 🚀 Deploy Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🔑 Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: 🐳 Build Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:backend ./backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:backend-${{ github.sha }} ./backend
      
      - name: 🐳 Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:frontend ./frontend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:frontend-${{ github.sha }} ./frontend
      
      - name: 📤 Push Backend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:backend
          docker push ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:backend-${{ github.sha }}
      
      - name: 📤 Push Frontend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:frontend-${{ github.sha }}
      
      - name: 📤 Push Latest Tags
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:backend ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:backend-latest
          docker tag ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:frontend ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:frontend-latest
          docker push ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:backend-latest
          docker push ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:frontend-latest
      
      - name: ✅ Deploy concluído
        run: |
          echo "🎉 Deploy realizado com sucesso!"
          echo "📦 Imagens disponíveis:"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:backend"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:frontend"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:backend-latest"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/rag-ia-github-actions:frontend-latest"

  # ============================================
  # JOB 3: NOTIFICAÇÃO
  # ============================================
  notify:
    name: 📢 Notificação
    runs-on: ubuntu-latest
    needs: [build-and-test, deploy]
    if: always()
    
    steps:
      - name: ✅ Status Final
        run: |
          echo "========================================="
          echo "📊 STATUS DO PIPELINE"
          echo "========================================="
          echo "🔨 Build & Test: ${{ needs.build-and-test.result }}"
          echo "🚀 Deploy: ${{ needs.deploy.result }}"
          echo "========================================="
          
          if [ "${{ needs.build-and-test.result }}" == "success" ]; then
            echo "🎉 Pipeline executado com sucesso!"
          else
            echo "❌ Pipeline falhou!"
            exit 1
          fi
