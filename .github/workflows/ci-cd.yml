name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Test Backend
        run: |
          cd backend
          npm install
          npm test
      
      - name: Build Docker Images
        run: |
          docker build -t assistente-backend ./backend
          docker build -t assistente-frontend ./frontend
      
      - name: Verify Docker Images
        run: |
          docker images | grep assistente
          echo "✅ Build concluído com sucesso!"

