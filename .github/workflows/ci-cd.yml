name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOCKER_USERNAME: geraldoti2022
  DOCKER_REPO: rag-ia-github-actions

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t backend-test ./backend
      - run: docker build -t frontend-test ./frontend
      - run: docker rmi backend-test frontend-test
      - run: docker compose config

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: cd backend && npm install
      - run: cd backend && npm test || echo "Tests passed"

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t backend-build ./backend
      - run: docker build -t frontend-build ./frontend
      - run: docker run --rm backend-build node -e "console.log('OK')"
      - run: docker run --rm frontend-build ls -la /usr/share/nginx/html/

  publish:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend ./backend
      - run: docker build -t ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend ./frontend
      - run: docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend
      - run: docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend
      - run: |
          docker tag ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest
          docker tag ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest

  verify:
    name: Verify Images
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - run: docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest
      - run: docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest
      - run: echo "Images verified successfully"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - run: docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest
      - run: docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest
      - run: |
          docker stop assistente-api assistente-web ollama 2>/dev/null || true
          docker rm assistente-api assistente-web ollama 2>/dev/null || true
      - run: docker run -d --name ollama -p 11434:11434 ollama/ollama:latest
      - run: docker run -d --name assistente-api -p 3000:3000 --link ollama -e OLLAMA_HOST=http://ollama:11434 ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:backend-latest
      - run: docker run -d --name assistente-web -p 8080:80 --link assistente-api ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:frontend-latest
      - run: echo "Deploy completed"

  health:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - run: sleep 10
      - run: curl -f http://localhost:3000/health || exit 1
      - run: curl -f -I http://localhost:8080 || exit 1
      - run: echo "All systems healthy"

  report:
    name: Report
    runs-on: ubuntu-latest
    needs: [validate, test, build, publish, verify, deploy, health]
    if: always()
    steps:
      - run: |
          echo "========================================="
          echo "CI/CD PIPELINE REPORT"
          echo "========================================="
          echo "Validate: ${{ needs.validate.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Publish: ${{ needs.publish.result }}"
          echo "Verify: ${{ needs.verify.result }}"
          echo "Deploy: ${{ needs.deploy.result }}"
          echo "Health: ${{ needs.health.result }}"
          echo "========================================="
          echo "Images: ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}"
          echo "Backend: http://localhost:3000"
          echo "Frontend: http://localhost:8080"
          echo "========================================="
