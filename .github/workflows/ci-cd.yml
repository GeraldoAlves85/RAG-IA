name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Test Backend
        run: |
          cd backend
          npm install
          npm test
      
      - name: Build Docker Images
        run: |
          docker build -t assistente-backend ./backend
          docker build -t assistente-frontend ./frontend
          echo "✅ Build concluído com sucesso!"
      
      - name: Verify Images
        run: |
          docker images | grep assistente
          echo "✅ Imagens criadas com sucesso!"
      
      - name: Test Docker Compose syntax
        run: |
          # Usar 'docker compose' em vez de 'docker-compose'
          docker compose config
          echo "✅ Docker Compose válido!"
      
      - name: Final Status
        run: |
          echo "🎉 Pipeline concluído com sucesso!"
          echo "✅ Backend image: assistente-backend:latest"
          echo "✅ Frontend image: assistente-frontend:latest"
          echo "✅ Docker Compose: válido"
